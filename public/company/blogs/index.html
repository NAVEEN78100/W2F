<!doctype html><html lang="en"><head><meta charset="utf-8"/><link rel="icon" href="/company/blogs/favicon.ico"/><meta name="viewport" content="width=device-width,initial-scale=1"/><meta name="theme-color" content="#000000"/><meta name="description" content="Web site created using create-react-app"/><link rel="apple-touch-icon" href="/company/blogs/logo192.png"/><link rel="manifest" href="/company/blogs/manifest.json"/><title>React App</title><style>.bg-\[\#FF3B2E\]{background-color:rgb(253,204,8)!important}@keyframes backHomeFloat{0%,to{transform:translateY(0)}50%{transform:translateY(-2px)}}.back-home-btn{position:fixed;top:16px;left:16px;z-index:9999;display:inline-flex;align-items:center;gap:8px;background:rgba(255,248,209,.92);color:#5b4500;padding:10px 14px;border-radius:999px;border:1px solid rgba(253,204,8,.75);text-decoration:none;font:600 14px/1 Inter,system-ui,Segoe UI,Roboto,Arial,sans-serif;box-shadow:0 8px 22px rgba(0,0,0,.16);backdrop-filter:blur(6px);transition:transform .28s ease,box-shadow .28s ease,background-color .28s ease,color .28s ease;animation:backHomeFloat 3s ease-in-out infinite}.back-home-btn:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(0,0,0,.2);background:#fff5cc;color:#3d2f00}.back-home-btn:active{transform:translateY(0) scale(.98)}.back-home-btn .arrow{transition:transform .28s ease}.back-home-btn:hover .arrow{transform:translateX(-2px)}.w2f-scroll-item{opacity:0;transform:translateY(80px) scale(.78) rotate(7deg);transform-origin:50% 50%;will-change:opacity,transform;transition:opacity 2.2s cubic-bezier(.175,.885,.32,1.275),transform 2.2s cubic-bezier(.175,.885,.32,1.275)}.w2f-scroll-item.is-visible{opacity:1;transform:translateY(0) scale(1) rotate(0)}@media (prefers-color-scheme: dark){.back-home-btn{background:rgba(34,31,19,.9);color:#fde07a;border-color:rgba(253,204,8,.45)}.back-home-btn:hover{background:rgba(50,44,24,.95);color:#ffe89d}}</style><script defer="defer" src="/company/blogs/static/js/main.22a49d32.js"></script><link href="/company/blogs/static/css/main.e74b5001.css" rel="stylesheet"></head><body><a href="/" class="back-home-btn"><span class="arrow" aria-hidden="true">←</span><span>back to home</span></a><noscript>You need to enable JavaScript to run this app.</noscript><div id="root"></div><script>(function(){var MAX_TRIES=40;var tries=0;function isW2FLetter(img){if(!img||!img.getAttribute)return false;var src=(img.getAttribute("src")||"").toLowerCase();var name=src.split("/").pop();return name==="w.png"||name==="2.png"||name==="f.png"}function wireAnimation(){var imgs=Array.from(document.querySelectorAll("img")).filter(isW2FLetter);if(imgs.length<3)return false;imgs.forEach(function(img,index){var holder=img.closest("div")||img;holder.classList.add("w2f-scroll-item");holder.style.transitionDelay=(index*0.22)+"s"});var observer=new IntersectionObserver(function(entries){entries.forEach(function(entry){if(entry.isIntersecting){entry.target.classList.add("is-visible")}else{entry.target.classList.remove("is-visible")}})},{threshold:.35,rootMargin:"0px 0px -10% 0px"});imgs.forEach(function(img){observer.observe(img.closest("div")||img)});return true}function boot(){if(wireAnimation())return;tries+=1;if(tries<MAX_TRIES){setTimeout(boot,250)}}if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",boot)}else{boot()}})();</script></body></html>
